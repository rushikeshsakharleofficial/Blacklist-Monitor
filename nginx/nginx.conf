# No upstream blocks — use resolver + variables so nginx re-resolves
# container IPs on each request instead of caching at startup.
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP — redirect to HTTPS
server {
    listen 80;
    server_name _;

    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS with self-signed cert (dev) / Let's Encrypt (prod)
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/conf.d/self-signed.crt;
    ssl_certificate_key /etc/nginx/conf.d/self-signed.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    # HSTS intentionally omitted in dev — self-signed cert + non-standard port causes
    # Chrome to cache localhost as HTTPS-only on port 443, breaking the dev environment.
    # HSTS is enabled in nginx.prod.conf.example for production only.
    add_header Referrer-Policy "no-referrer";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # WebSocket — real-time problems feed
    location /api/ws/ {
        set $api http://api:8000;
        rewrite ^/api/ws/(.*)$ /ws/$1 break;
        proxy_pass $api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # API — strip /api prefix before forwarding
    location /api/ {
        set $api http://api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend
    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
