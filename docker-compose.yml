services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/blacklist_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
  worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/blacklist_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=blacklist_db
  redis:
    image: redis:7
